name: Prompt Regression

on:
  # schedule:
  #   - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"
      - run: uv python install 3.11
      - run: uv sync --extra azure
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sample traces from App Insights
        env:
          APPINSIGHTS_APP_ID: ${{ secrets.APPINSIGHTS_APP_ID }}
          APPINSIGHTS_API_KEY: ${{ secrets.APPINSIGHTS_API_KEY }}
        run: |
          uv run python scripts/sample_traces.py \
            --output reports/traces.jsonl \
            --max-traces 20 \
            --days-back 7
      - name: Run judge regression
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
        run: |
          uv run python scripts/run_prompt_regression.py \
            --traces-file reports/traces.jsonl \
            --baseline-file data/judge_baseline.json \
            --output reports/regression \
            --threshold 0.5 \
            --skip-sample
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: reports/regression/
      - name: Open issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Prompt regression detected — ${new Date().toISOString().slice(0,10)}`,
              body: 'Nightly judge regression fired. Investigate.',
              labels: ['regression', 'prompts'],
            });
