name: Deploy Endpoint

on:
  # push:
  #   tags: ["v*"]
  workflow_dispatch:
    inputs:
      deployment_name:
        description: "Deployment name (blue/green)"
        required: true
        default: "green"

concurrency:
  group: deploy-endpoint
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"
      - run: uv python install 3.11
      - run: uv sync --extra azure
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy new deployment
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
        run: |
          uv run python scripts/deploy_endpoint.py \
            --deployment-name "${{ github.event.inputs.deployment_name || 'green' }}"
      - name: Smoke test
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AML_WORKSPACE_NAME: ${{ secrets.AML_WORKSPACE_NAME }}
        run: |
          key=$(az ml online-endpoint get-credentials \
            --name docusense-online \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --workspace-name "$AML_WORKSPACE_NAME" \
            --query primaryKey -o tsv)
          uri=$(az ml online-endpoint show \
            --name docusense-online \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --workspace-name "$AML_WORKSPACE_NAME" \
            --query scoring_uri -o tsv)
          uv run python scripts/smoke_endpoint.py --url "$uri" --api-key "$key"
