  #     - "src/docusense/evals/**"
  #     - "data/**"
  #     - ".github/workflows/evals.yml"
  workflow_dispatch:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"
      - run: uv python install 3.11
      - name: Sync deps
        run: uv sync --extra dev
      - name: Generate sample corpus
        run: uv run python scripts/generate_sample_corpus.py
      - name: Deterministic + judge regression (fake LLM)
        run: uv run pytest -m evals -v

  judge_on_prompt_changes:
    if: contains(join(github.event.pull_request.changed_files.*.filename, ' '), 'src/docusense/llm/prompts/')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"
      - run: uv python install 3.11
      - name: Sync deps
        run: uv sync --extra dev --extra azure
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Run judge against golden prompts
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: |
